<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Christopher Lam">
    <meta name="theme-color" content="#000000">
    <meta name="robots" content="noindex">

    <title>Log - Christopher Lam</title>

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Font with optimized loading -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/fav.svg" type="image/svg+xml">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/styles.css">

    <style>
        #post {
            margin: var(--spacing-md);
            max-width: 70ch;
            line-height: 1.7;
        }

        #post h1,
        #post h2,
        #post h3 {
            font-weight: var(--font-weight-black);
            line-height: 1.3;
            margin: 1.6em 0 0.4em;
        }

        #post h1 { font-size: 1.6rem; }
        #post h2 { font-size: 1.3rem; }
        #post h3 { font-size: 1.1rem; }

        #post p,
        #post ul,
        #post ol,
        #post blockquote {
            font-size: 1rem;
            margin: 0 0 1em;
        }

        #post a {
            text-decoration: underline;
        }

        #post img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 1.5em 0;
        }

        #post blockquote {
            border-left: 2px solid var(--color-secondary);
            padding-left: 1em;
            color: var(--color-secondary);
        }

        #post code {
            font-size: 0.9rem;
            background: #f2f2f2;
            padding: 0.1em 0.3em;
        }

        #post pre {
            background: #f2f2f2;
            padding: 1em;
            overflow-x: auto;
        }

        #post pre code {
            background: none;
            padding: 0;
        }

        #post hr {
            border: none;
            border-top: 1px solid var(--color-secondary);
            margin: 2em 0;
        }

        .post-back {
            display: inline-block;
            margin: var(--spacing-md);
            margin-bottom: 0;
            color: var(--color-secondary);
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav id="bar" role="navigation" aria-label="Main navigation">
        <a href="/photos.html">photos</a>
        <a href="/projects.html">projects</a>
        <a href="/resume.html">resume</a>
    </nav>

    <!-- Header/Letterhead -->
    <header id="letterhead">
        <a style="font-weight: 800" href="/index.html" aria-label="Home"> Christopher Lam </a>
        <br>
        <a href="https://www.google.com/maps/place/San+Francisco,+CA/@37.757807,-122.5200005,12z/data=!3m1!4b1!4m6!3m5!1s0x80859a6d00690021:0x4a501367f076adff!8m2!3d37.7749295!4d-122.4194155!16zL20vMGQ2bHA?entry=ttu&g_ep=EgoyMDI0MTIxMS4wIKXMDSoASAFQAw%3D%3D"
           target="_blank"
           rel="noopener noreferrer">San Francisco California</a>
        <br>
        <a href="https://www.instagram.com/topher_lam/"
           target="_blank"
           rel="noopener noreferrer">@topher_lam</a>
        <a href="https://youtu.be/tH63sBOTIeQ"
           id="time"
           target="_blank"
           rel="noopener noreferrer"
           aria-label="Current time"></a>
        <br>
        <a href="mailto:cjlbears@gmail.com">cjlbears@gmail.com</a>
    </header>

    <!-- Main Content -->
    <a class="post-back" href="/log.html">&larr; log</a>
    <main>
        <article id="post">Loading&hellip;</article>
    </main>

    <!-- Footer -->
    <footer>
        &copy; 2026 Christopher Lam. <a class="motto-link" href="/log.html">Ad Astra per Aspera</a>
    </footer>

    <!-- Markdown renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        (function () {
            const post = document.getElementById("post");

            // Read the requested slug and reject anything that isn't a safe filename
            const slug = new URLSearchParams(window.location.search).get("p") || "";
            if (!/^[a-z0-9-]+$/.test(slug)) {
                post.textContent = "Post not found.";
                return;
            }

            fetch(`/log/${slug}.md`)
                .then(res => {
                    if (!res.ok) throw new Error("missing");
                    return res.text();
                })
                .then(md => {
                    post.innerHTML = marked.parse(md);
                    // Use the first heading as the page title, if present
                    const h = post.querySelector("h1, h2");
                    if (h) document.title = `${h.textContent} - Christopher Lam`;
                })
                .catch(() => {
                    post.textContent = "Post not found.";
                });
        })();
    </script>
</body>
</html>
